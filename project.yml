name: JiraSummary
options:
  bundleIdPrefix: com.jordankoch
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  JiraSummary:
    type: application
    platform: macOS
    sources:
      - path: JiraSummary
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordankoch.JiraSummary
        PRODUCT_NAME: JiraSummary
        INFOPLIST_FILE: JiraSummary/Info.plist
        CODE_SIGN_ENTITLEMENTS: JiraSummary/JiraSummary.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGNING_ALLOWED: false
    entitlements:
      path: JiraSummary/JiraSummary.entitlements
